name: snap_bill
description: Snap & Bill – Turn receipts into digital invoices instantly.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Network / API
  dio: ^5.4.3+1
  http: ^1.2.1

  # Image picker & camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # File & storage
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  pdf: ^3.11.1
  printing: ^5.13.1

  # Local storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  dotted_border: ^2.1.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.0.0
  freezed: ^2.0.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
